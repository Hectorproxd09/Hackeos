    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Staatliches', cursive;
            color: #000000;
            background-image: url('https://i.pinimg.com/1200x/28/1e/a0/281ea01371b9e2265eeb68fd74b3d7f4.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            background: rgba(90, 179, 7, 0.97);
            border: 6px solid #005C31;
            border-radius: 30px;
            padding: 65px;
            box-shadow: 
                0 0 80px rgba(5, 92, 49, 0.9),
                inset 0 0 50px rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(30px);
            max-width: 700px;
            width: 94%;
            text-align: center;
            position: relative;
        }

        .container::before {
            content: '';
            position: absolute;
            inset: -5px;
            background: conic-gradient(from 0deg, #005C31, #5AB307, #78e911, #005C31);
            border-radius: 35px;
            z-index: -1;
            animation: conicSpin 8s linear infinite;
        }

        @keyframes conicSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        h1 {
            font-family: 'Creepster', cursive;
            font-size: 5.5rem;
            background: linear-gradient(145deg, #005C31 0%, #5AB307 40%, #78e911 70%, #005C31 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 
                0 0 60px rgba(5, 92, 49, 1),
                5px 5px 0 rgba(255,255,255,0.3),
                -5px -5px 0 rgba(0,0,0,0.8);
            margin-bottom: 55px;
            letter-spacing: 7px;
            animation: glitch 2s infinite;
        }

        @keyframes glitch {
            0%, 100% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
        }

        .button {
            display: block;
            width: 100%;
            padding: 26px 50px;
            margin: 25px 0;
            font-family: 'Staatliches', cursive;
            font-size: 24px;
            font-weight: bold;
            color: #005C31;
            background-color: #5AB307;
            border: 4px solid #005C31;
            border-radius: 18px;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 4px;
            cursor: pointer;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.9);
            box-shadow: 
                0 8px 35px rgba(90, 179, 7, 0.7),
                inset 0 2px 10px rgba(255,255,255,0.2);
        }

        .button.site {
            color: #000000;
            margin-top: 0;
        }

        .button span {
            position: relative;
            z-index: 2;
        }

        .button::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, 
                rgba(5, 92, 49, 0.3) 0%,
                rgba(120, 233, 17, 0.5) 50%,
                rgba(5, 92, 49, 0.3) 100%
            );
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: 1;
        }

        .button:hover::before {
            opacity: 1;
        }

        .button:hover {
            background-color: #6BC518;
            border-color: #78e911;
            box-shadow: 
                0 20px 65px rgba(120, 233, 17, 1),
                0 0 50px rgba(90, 179, 7, 0.9),
                inset 0 0 30px rgba(120, 233, 17, 0.4);
            transform: translateY(-15px) rotateZ(2deg);
            color: #005C31;
        }

        .button:focus {
            outline: none;
            background-color: #5AB307;
            box-shadow: 
                0 0 60px rgba(255, 165, 0, 1),
                0 0 90px rgba(90, 179, 7, 1),
                0 0 130px rgba(120, 233, 17, 1),
                inset 0 0 45px rgba(255, 165, 0, 0.6);
            transform: translateY(-8px) scale(1.03);
            border-color: #ffa500;
            color: #005C31;
        }

        .button:active {
            transform: translateY(-6px) scale(0.98);
        }

        /* Matrix rain effect */
        .matrix {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0.1;
            z-index: -2;
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 {
                font-size: 4rem;
                letter-spacing: 4px;
            }
            
            .button {
                font-size: 22px;
                padding: 24px 42px;
            }
            
            .container {
                padding: 50px 40px;
                margin: 25px;
                width: 97%;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 3.2rem;
                letter-spacing: 2px;
            }
            
            .button {
                font-size: 20px;
                padding: 22px 35px;
            }
            
            .container {
                padding: 40px 30px;
            }
        }
    </style>
</head>
