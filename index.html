<head>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Staatliches', cursive;
            color: #000000;
            background-image: url('https://i.pinimg.com/736x/42/a9/58/42a95890219d5962abe8e460c1513fe0.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            background: rgba(0, 0, 0, 0.85);
            border: 3px solid #78e911;
            border-radius: 15px;
            padding: 50px;
            box-shadow: 0 0 40px rgba(120, 233, 17, 0.6);
            backdrop-filter: blur(15px);
            max-width: 550px;
            width: 90%;
            text-align: center;
            position: relative;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #78e911, #00ff88, #78e911);
            border-radius: 15px 15px 0 0;
        }

        h1 {
            font-family: 'Creepster', cursive;
            font-size: 4rem;
            background: linear-gradient(45deg, #78e911, #00ff88, #78e911);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(120, 233, 17, 0.8);
            margin-bottom: 40px;
            letter-spacing: 4px;
            animation: headerGlow 2.5s ease-in-out infinite alternate;
        }

        @keyframes headerGlow {
            from {
                filter: drop-shadow(0 0 20px #78e911);
            }
            to {
                filter: drop-shadow(0 0 40px #78e911) drop-shadow(0 0 60px #00ff88);
            }
        }

        .button {
            display: block;
            width: 100%;
            padding: 20px 35px;
            margin: 18px 0;
            font-family: 'Staatliches', cursive;
            font-size: 24px;
            font-weight: bold;
            color: #78e911;
            background-color: #005C31;
            border: 3px solid #78e911;
            border-radius: 10px;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
            overflow: hidden;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .button.site {
            background-color: #005C31;
            color: #000000;
        }

        .button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(120, 233, 17, 0.3), transparent);
            transition: left 0.6s;
        }

        .button:hover::before {
            left: 100%;
        }

        .button:hover {
            background: linear-gradient(45deg, #006633, #00753f, #006633);
            box-shadow: 0 8px 35px rgba(120, 233, 17, 0.7);
            transform: translateY(-5px) scale(1.02);
            border-color: #00ff88;
            color: #78e911;
        }

        .button:focus {
            outline: none;
            box-shadow: 
                0 0 25px rgba(255, 165, 0, 0.9),
                0 0 40px rgba(120, 233, 17, 0.8),
                inset 0 0 20px rgba(255, 165, 0, 0.3);
            border-color: #ffa500;
        }

        .button:active {
            transform: translateY(-2px) scale(1.01);
        }

        /* Animación de contenedor */
        .container {
            animation: containerPulse 4s ease-in-out infinite;
        }

        @keyframes containerPulse {
            0%, 100% { 
                box-shadow: 0 0 40px rgba(120, 233, 17, 0.6);
                border-color: #78e911;
            }
            50% { 
                box-shadow: 0 0 70px rgba(120, 233, 17, 0.9), 0 0 100px rgba(0, 255, 136, 0.5);
                border-color: #00ff88;
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 {
                font-size: 2.8rem;
            }
            
            .button {
                font-size: 20px;
                padding: 18px 28px;
            }
            
            .container {
                padding: 35px 25px;
                margin: 20px;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 2.2rem;
                letter-spacing: 2px;
            }
        }
    </style>
</head>
<body>
